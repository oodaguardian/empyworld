server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Bunny Storage Zone reverse proxy (keeps AccessKey server-side)
    location /api/bunny/ {
        rewrite ^/api/bunny/(.*)$ /__BUNNY_ZONE__/$1 break;
        proxy_pass https://__BUNNY_HOST__;
        proxy_set_header Host __BUNNY_HOST__;
        proxy_set_header AccessKey __BUNNY_PASS__;
        proxy_set_header Accept $http_accept;
        proxy_set_header Content-Type $http_content_type;
        proxy_request_buffering off;
        client_max_body_size 0;
    }

    # React Router — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
