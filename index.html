<!DOCTYPE html>
<html lang="en" data-theme="empytv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#FF2D8B" />
  <title>Empy TV 🌸</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="overflow-hidden">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Register service worker for PWA + Web Push
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((reg) => {
          console.log('[SW] registered:', reg.scope);
          // Listen for messages from SW (call accept/decline from notification)
          navigator.serviceWorker.addEventListener('message', (e) => {
            window.dispatchEvent(new CustomEvent('sw-message', { detail: e.data }));
          });
        }).catch((e) => console.warn('[SW] registration failed:', e));
      });
    }
  </script>
</body>
</html>
