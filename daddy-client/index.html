<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Daddy from Empy" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>Daddy — Empy's World 💌</title>
  <meta name="theme-color" content="#FF2D8B" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #160020 0%, #2D0050 35%, #200040 60%, #0D1A6E 100%);
      color: #fff;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .font-display { font-family: 'Fredoka One', cursive; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((reg) => {
          console.log('[SW] Daddy client SW registered', reg.scope);
        }).catch((err) => console.warn('[SW] registration failed', err));
      });
      navigator.serviceWorker.addEventListener('message', (event) => {
        window.dispatchEvent(new CustomEvent('sw-message', { detail: event.data }));
      });
    }
  </script>
</body>
</html>
