version: '3.8'

services:
  empy-tv:
    build:
      context: .
      args:
        # These are read from your .env.local at build time
        VITE_YOUTUBE_API_KEY: ${VITE_YOUTUBE_API_KEY}
        VITE_BUNNY_MOVIES_CDN: ${VITE_BUNNY_MOVIES_CDN}
        BUNNY_STORAGE_ZONE: ${VITE_BUNNY_STORAGE_ZONE}
        BUNNY_STORAGE_HOST: ${VITE_BUNNY_STORAGE_HOST}
        BUNNY_STORAGE_PASSWORD: ${VITE_BUNNY_STORAGE_PASSWORD}
    image: empy-tv:latest
    ports:
      - "80:80"
    restart: unless-stopped
