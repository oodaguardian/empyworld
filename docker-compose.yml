version: '3.8'

services:
  empy-tv:
    build:
      context: .
      args:
        # These are read from your .env.local at build time
        VITE_YOUTUBE_API_KEY: ${VITE_YOUTUBE_API_KEY}
        VITE_BUNNY_LIBRARY_ID: ${VITE_BUNNY_LIBRARY_ID}
        VITE_BUNNY_STREAM_API_KEY: ${VITE_BUNNY_STREAM_API_KEY}
        VITE_BUNNY_CDN_HOSTNAME: ${VITE_BUNNY_CDN_HOSTNAME}
        VITE_BUNNY_EDGE_API_URL: ${VITE_BUNNY_EDGE_API_URL}
    image: empy-tv:latest
    ports:
      - "80:80"
    restart: unless-stopped
